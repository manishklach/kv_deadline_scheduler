[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kv-deadline-scheduler"
version = "0.1.0"
description = "Runtime-declared memory intent for KV-cache orchestration."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "OpenAI Codex"}]
dependencies = []

[project.scripts]
kvmi = "kv_memory_intent.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
kv_memory_intent = ["py.typed"]
